<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subtitle Hover Translator Promo</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(255, 223, 194, 0.8), transparent 34%),
          linear-gradient(135deg, #f4eadf, #ead6c3 58%, #f7f0e8);
        color: #2d1a12;
      }

      .frame {
        width: 440px;
        height: 280px;
        position: relative;
        overflow: hidden;
      }

      .panel {
        position: absolute;
        inset: 22px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.64);
        box-shadow: 0 20px 50px rgba(66, 34, 14, 0.12);
        backdrop-filter: blur(10px);
      }

      .copy {
        position: absolute;
        left: 34px;
        top: 30px;
        right: 170px;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #90593b;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 0.95;
      }

      .sub {
        margin: 14px 0 0;
        font-size: 15px;
        line-height: 1.45;
        color: #5b392a;
      }

      .card {
        position: absolute;
        right: 30px;
        top: 34px;
        width: 142px;
        padding: 12px;
        border-radius: 20px;
        background:
          linear-gradient(180deg, rgba(40, 29, 23, 0.78), rgba(25, 18, 14, 0.68)),
          rgba(20, 15, 12, 0.48);
        color: #fff7ef;
        box-shadow: 0 18px 36px rgba(26, 12, 6, 0.2);
      }

      .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255, 237, 223, 0.12);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #ffd8bc;
      }

      .word {
        margin: 10px 0 4px;
        font-size: 17px;
        font-weight: 700;
      }

      .translation {
        font-size: 20px;
        line-height: 1.1;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .chip {
        padding: 5px 8px;
        border-radius: 999px;
        font-size: 10px;
        background: rgba(255, 237, 223, 0.08);
        border: 1px solid rgba(255, 229, 209, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="panel"></div>
      <div class="copy">
        <p class="eyebrow">Chrome Extension</p>
        <h1>Translate on hover.</h1>
        <p class="sub">
          Words, subtitles, and short text selections translated directly inside the page.
        </p>
      </div>
      <div class="card">
        <span class="badge">Kelime</span>
        <p class="word">difficult</p>
        <div class="translation">zor</div>
        <div class="chips">
          <span class="chip">hard</span>
          <span class="chip">tough</span>
          <span class="chip">complex</span>
        </div>
      </div>
    </div>
  </body>
</html>
