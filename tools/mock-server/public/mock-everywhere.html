<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Everywhere Fixture</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(180deg, #f7f2ea, #f0e2cf);
        color: #241a13;
      }

      main {
        width: min(980px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
        display: grid;
        gap: 18px;
      }

      .card {
        padding: 18px;
        border-radius: 22px;
        background: rgba(255, 252, 248, 0.92);
        border: 1px solid rgba(78, 57, 39, 0.12);
        box-shadow: 0 14px 34px rgba(78, 57, 39, 0.08);
      }

      iframe {
        width: 100%;
        height: 220px;
        border: 0;
        border-radius: 18px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Everywhere fixture</h1>
        <p>Hover the word <strong>ordinary</strong> to verify top-level page text.</p>
      </section>

      <section class="card">
        <h2>Open shadow root</h2>
        <div id="shadow-host"></div>
      </section>

      <section class="card">
        <h2>srcdoc iframe</h2>
        <iframe
          id="fixture-frame"
          srcdoc="
            <!DOCTYPE html>
            <html lang='en'>
              <body style='margin:0;padding:22px;font-family:Georgia,serif;background:#fff9f3;color:#231a13;'>
                <p style='font-size:20px;line-height:1.6;'>Hover the word framed to verify iframe injection.</p>
              </body>
            </html>
          "
        ></iframe>
      </section>
    </main>

    <script>
      const host = document.getElementById('shadow-host');
      const shadowRoot = host.attachShadow({ mode: 'open' });
      shadowRoot.innerHTML = `
        <style>
          .surface {
            padding: 16px;
            border-radius: 18px;
            background: rgba(251, 243, 232, 0.96);
            border: 1px solid rgba(78, 57, 39, 0.1);
            font-size: 20px;
            line-height: 1.65;
            color: #241a13;
          }
        </style>
        <div class="surface">Hover the word hidden to verify shadow root text.</div>
      `;
    </script>
  </body>
</html>
